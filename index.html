        body { background: #09090b; font-family: 'Rajdhani', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; position: relative; }

        @keyframes drift { 0% { transform: rotate(-2deg) translate(-5%, -5%); } 50% { transform: rotate(2deg) translate(5%, 5%); } 100% { transform: rotate(-2deg) translate(-5%, -5%); } }
        .card { position: relative; z-index: 10; background: rgba(18, 18, 20, 0.7); border: 2px solid #d946ef; border-radius: 40px; padding: 2.5rem; width: 90%; max-width: 450px; backdrop-filter: blur(20px); box-shadow: 0 0 60px rgba(217, 70, 239, 0.2); }
        .avatar-wrapper { width: 180px; height: 180px; margin: 0 auto 1.5rem; position: relative; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #d946ef; object-fit: cover; transition: all 0.5s ease; box-shadow: 0 0 30px rgba(217, 70, 239, 0.5); }
        .avatar:hover { transform: scale(1.05) rotate(360deg); border-color: #ffffff; }
        .nick-font { font-family: 'Monoton', cursive; letter-spacing: 0.1em; text-shadow: 0 0 15px #d946ef, 0 0 30px #d946ef; }
        .link-btn { background: linear-gradient(90deg, #18181b, #27272a); border: 2px solid #d946ef; color: white; padding: 1rem; border-radius: 20px; text-align: center; font-size: 1rem; font-weight: 700; letter-spacing: 0.1em; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; }
        .link-btn:hover { transform: scale(1.05); background: #d946ef; color: black; box-shadow: 0 0 20px #d946ef; }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        /* Скрываем иконку счетчика, чтобы не ломала дизайн */

    <script>
        // Анимация фона
        const bg = document.getElementById('bg-layer');
        const symbols = ["{ }", "</>", "🎮", "🕹️", "LIVE", "PWR", "BUG", "0101", "⌨️", "🚀"];
        for(let i=0; i<40; i++) {
            const div = document.createElement('div');
            div.textContent = symbols[Math.floor(Math.random()*symbols.length)];
            div.className = "flex items-center justify-center font-bold";
            div.style.textShadow = "0 0 10px #d946ef, 0 0 20px #d946ef"; 
            bg.appendChild(div);
        }

        // Логика звуков для кнопок
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'hover') { 
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.05); 
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.05); 
            } else if (type === 'click') { 
                osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1); 
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.1); 
            }
        }
        document.querySelectorAll('.btn-audio').forEach(btn => {
            btn.addEventListener('mouseenter', () => playSound('hover'));
            btn.addEventListener('click', () => playSound('click'));
        });
    </script>
