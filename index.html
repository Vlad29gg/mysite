<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Papachiz123 | Ultimate Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Orbitron:wght@400;900&family=Rajdhani:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        body { background: #09090b; font-family: 'Rajdhani', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; position: relative; overflow-x: hidden; }
        .bg-layer { position: absolute; inset: -20%; z-index: 0; opacity: 0.2; font-size: 2rem; color: #d946ef; pointer-events: none; display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px; animation: drift 30s linear infinite; }
        @media (min-width: 768px) { .bg-layer { grid-template-columns: repeat(10, 1fr); font-size: 3rem; } }
        @keyframes drift { 0% { transform: rotate(-2deg) translate(-5%, -5%); } 50% { transform: rotate(2deg) translate(5%, 5%); } 100% { transform: rotate(-2deg) translate(-5%, -5%); } }
        
        /* Адаптивная карточка с принудительной шириной для предотвращения падения контента */
        .card { position: relative; z-index: 10; background: rgba(18, 18, 20, 0.8); border: 2px solid #d946ef; border-radius: 30px; padding: 1.5rem; width: 95%; max-width: 500px; backdrop-filter: blur(15px); box-shadow: 0 0 40px rgba(217, 70, 239, 0.2); display: flex; flex-direction: column; align-items: center; }
        @media (min-width: 640px) { .card { padding: 2.5rem; border-radius: 40px; } }
        
        .avatar-wrapper { width: 120px; height: 120px; margin-bottom: 1rem; position: relative; flex-shrink: 0; }
        @media (min-width: 640px) { .avatar-wrapper { width: 150px; height: 150px; } }
        
        .avatar { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #d946ef; object-fit: cover; transition: all 0.5s ease; box-shadow: 0 0 20px rgba(217, 70, 239, 0.4); }
        .nick-font { font-family: 'Monoton', cursive; letter-spacing: 0.1em; text-shadow: 0 0 10px #d946ef; font-size: 1.25rem; margin-bottom: 1rem; }
        @media (min-width: 640px) { .nick-font { font-size: 2rem; text-shadow: 0 0 15px #d946ef, 0 0 30px #d946ef; } }
        
        /* Улучшенная ширина кнопок */
        .links-container { width: 100%; display: flex; flex-direction: column; gap: 0.75rem; }
        .link-btn { background: linear-gradient(90deg, #18181b, #27272a); border: 2px solid #d946ef; color: white; padding: 0.75rem; border-radius: 16px; text-align: center; font-size: 0.85rem; font-weight: 700; transition: all 0.3s ease; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
        @media (min-width: 640px) { .link-btn { padding: 0.9rem; border-radius: 20px; font-size: 0.95rem; } }
        .link-btn:hover { transform: scale(1.02); background: #d946ef; color: black; }
        
        .status-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 6px #22c55e; flex-shrink: 0; }
        .statcounter a { display: none !important; }
    </style>
</head>
<body>
    <div class="bg-layer" id="bg-layer"></div>
    <div class="card text-center">
        <div class="avatar-wrapper">
            <img src="https://i.imgur.com/f9G8v5N.png" class="avatar" alt="Папачиз">
        </div>
        <h1 class="nick-font text-white uppercase">PAPACHIZ123</h1>
        <div class="links-container">
            <a href="#" class="link-btn btn-audio"><div class="status-dot"></div> TELEGRAM</a>
            <a href="#" class="link-btn btn-audio"><div class="status-dot"></div> TWITCH</a>
            <a href="#" class="link-btn btn-audio"><div class="status-dot"></div> TIKTOK</a>
            <a href="#" class="link-btn btn-audio"><div class="status-dot"></div> DISCORD</a>
            <a href="#" class="link-btn btn-audio"><div class="status-dot"></div> YOUTUBE</a>
        </div>
        
        <div class="mt-6 text-gray-400 text-[10px] sm:text-xs font-bold uppercase tracking-widest flex items-center gap-1">
            <span>Просмотров:</span>
            <div class="flex items-center">
                <!-- СЮДА ВСТАВЛЯЙ КОД STATCOUNTER МЕЖДУ ЭТИМИ КОММЕНТАРИЯМИ -->
                
                <!-- Код StatCounter -->
                
                <!-- КОНЕЦ ВСТАВКИ -->
            </div>
        </div>
    </div>
    <script>
        const bg = document.getElementById('bg-layer');
        const symbols = ["{ }", "</>", "🎮", "🕹️", "LIVE", "PWR", "BUG", "0101", "⌨️", "🚀"];
        for(let i=0; i<30; i++) {
            const div = document.createElement('div');
            div.textContent = symbols[Math.floor(Math.random()*symbols.length)];
            div.className = "flex items-center justify-center font-bold";
            bg.appendChild(div);
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'hover') { 
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.05); 
                gain.gain.setValueAtTime(0.01, audioCtx.currentTime); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.05); 
            } else if (type === 'click') { 
                osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1); 
                gain.gain.setValueAtHoTime(0.05, audioCtx.currentTime); 
                osc.start(); osc.stop(audioCtx.currentTime + 0.1); 
            }
        }
        document.querySelectorAll('.btn-audio').forEach(btn => {
            btn.addEventListener('mouseenter', () => playSound('hover'));
            btn.addEventListener('click', () => playSound('click'));
        });
    </script>
</body>
</html>
